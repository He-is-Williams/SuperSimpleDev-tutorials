<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style/general-styles.css">
    <link rel="stylesheet" href="style/header-styles.css">
    <link rel="stylesheet" href="style/video-preview-style.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,100..900;1,100..900&display=swap');
    </style>
    <title>YouTube</title>
</head>
<body>
    <header>
        <div class="left-section">
            <img class="hamburger-menu" src="icon images/hamburger-menu.svg" alt="hamburger-menu">
            <img class="youtube-logo" src="icon images/youtube-logo.svg" alt="youtube-logo">
        </div>
        <div class="middle-section">
            <input type="search" placeholder="Search">
            <button class="search-icon"><img src="icon images/search.svg" alt=""></button>
            <button class="voice-Search-icon"><img src="icon images/voice-search-icon.svg" alt=""></button>
        </div>
        <div class="right-section">
            <img src="icon images/upload.svg" alt="">
            <img src="icon images/youtube-apps.svg" alt="">
            <img src="icon images/notifications.svg" alt="">
            <div class="user-channel-pic">
                <img src="icon images/my-channel.jpeg" alt="">
            </div>
        </div>
    </header>

    <main>
        <div class="video-preview">
            <div class="thumbnail">
                <img src="thumbnail images/thumbnail-1.webp" alt="thumbnail">
            </div>
            <div class="thumbnail-info">
                <img class="image-thumbnail-info" src="channel images/channel-1.jpeg" alt="" >
                <div class="text-thumbnail-info">
                    <p class="Video-Topic">Talking Tech and AI with Google CEO Sundar Pichai!</p>
                    <p class="channel-owner">Marques Brownlee</p>
                    <p class="video-stats">3.4M views · 6 months ago</p>
                </div>
            </div>
        </div>
        
    </main>
</body>
</html>
