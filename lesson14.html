<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS Position</title>
    <link rel="stylesheet" href="style/lesson14.css">
</head>
<body style="
    height: 3000px;
">
    <div style="
        background-color: green;
        color: white;
        width: 100px;
        position: absolute;
        right: 0px;
        bottom: 0px;
        top: 0;
    ">right sidebar</div>
    <div style="
        background-color: rgba(0, 0, 0, 0.8);
        position: absolute;
        top: 0;
        bottom: 0;
        left: 0;
        right: 0;
        display: flex;
        justify-content: center;
        align-items: center;
    "> 
        <div style="
            background-color: white;
            width: 300px;
            padding: 10px 20px;
            border-radius: 9px;

        ">
            <p style="
                font-weight: bold;
                font-family: Arial, Helvetica, sans-serif;
                margin: 10px 0; 
            ">Modal Title</p>
            <p style="
                margin: 10px 0;
                font-family: Arial, Helvetica, sans-serif;
            ">This is modal</p>
            <button style="
                margin: 0 0 10px 0;
            ">close</button>
        </div>
    </div>    
</body>
</html>
