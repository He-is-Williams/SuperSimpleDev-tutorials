<Style>
    a{
       color: rgb(0, 113, 133);
       text-decoration: underline;
       font-size: 20px;
    }
    a:hover{
        color: rgb(241, 151, 32);
        cursor: pointer;
    }
    .product{
        font-family: 'Times New Roman', Times, serif;
        font-weight: bold;
        font-size: 40px;
    }
    .prize{
        font-family: 'Times New Roman', Times, serif;
        font-weight: bold;
        font-size: 30px;
        color: rgb(0, 118, 0);
    }
    .delivery{
        font-family: 'Times New Roman', Times, serif;
        font-size: 25px;
    }
    .cart{
        background-color: rgb(255, 216, 20);
        border: none;
        height: 60px;
        width: 190px;
        font-size: 24px;
        border-radius: 35px;
        margin-right: 20px;
    }
    .buy{
        background-color: rgb(255, 164, 28);
        border: none;
        height: 60px;
        width: 190px;
        font-size: 24px;
        border-radius: 35px;
        transition: opacity 0.3s ease;
    }
    .buy:hover{
        cursor: pointer;
        opacity: 0.8;
    }
    .buy:active{
        opacity: 0.6;
    }

</Style>

<a>Back to Amazon</a>
<p class="product">Nike Black Running Shoes</p>
<p class="prize">$39 - in stock.</p>
<p class="delivery">Free delivery tomorrow</p>
<button class="cart">Add to Cart</button>
<button class="buy">Buy Now</button>
